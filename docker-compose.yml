services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: joyce_work_schedule
      MYSQL_USER: joyce
      MYSQL_PASSWORD: ${JOYCE_DB_PASSWORD:-replace-with-db-password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-replace-with-root-password}
    ports:
      - "${JOYCE_DB_PORT:-3307}:3306"
    volumes:
      - joyce_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u joyce -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://joyce:${JOYCE_DB_PASSWORD:-replace-with-db-password}@db:3306/joyce_work_schedule
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

  migrate:
    profiles: ["migrate"]
    build:
      context: .
      target: migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://joyce:${JOYCE_DB_PASSWORD:-replace-with-db-password}@db:3306/joyce_work_schedule
    depends_on:
      db:
        condition: service_healthy

volumes:
  joyce_mysql_data:
