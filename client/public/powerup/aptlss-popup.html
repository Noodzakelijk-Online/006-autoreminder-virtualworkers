<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APTLSS Plan</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="/api/powerup/config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 16px;
      min-width: 360px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header h2 {
      font-size: 13px; font-weight: 700; color: #cba6f7;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .card-name {
      font-size: 12px; color: #89b4fa; margin-bottom: 10px;
      line-height: 1.4; max-height: 36px; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }

    /* ── Badge row ── */
    .badge-row {
      display: flex; align-items: center; gap: 6px;
      flex-wrap: wrap; margin-bottom: 10px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 99px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
    }
    .urgency-CRITICAL { background: #f38ba8; color: #1e1e2e; }
    .urgency-HIGH     { background: #fab387; color: #1e1e2e; }
    .urgency-MEDIUM   { background: #f9e2af; color: #1e1e2e; }
    .urgency-LOW      { background: #a6e3a1; color: #1e1e2e; }
    .confidence-high  { background: #a6e3a1; color: #1e1e2e; }
    .confidence-mid   { background: #f9e2af; color: #1e1e2e; }
    .confidence-low   { background: #f38ba8; color: #1e1e2e; }
    .time-badge       { background: #89b4fa; color: #1e1e2e; }
    .progress-badge   { background: #cba6f7; color: #1e1e2e; }
    .state-badge      { background: #45475a; color: #cdd6f4; font-size: 9px; }

    /* ── NBA banner ── */
    .nba-banner {
      background: rgba(203,166,247,0.12);
      border: 1px solid #cba6f7;
      border-radius: 8px; padding: 10px 12px; margin-bottom: 10px;
    }
    .nba-label {
      font-size: 9px; font-weight: 700; color: #cba6f7;
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;
    }
    .nba-text { font-size: 13px; font-weight: 600; color: #cdd6f4; line-height: 1.4; }

    /* ── Confidence reason ── */
    .confidence-reason {
      font-size: 10px; color: #6c7086; margin-bottom: 10px;
      font-style: italic; line-height: 1.4;
    }

    /* ── Escalation banner ── */
    .escalation-banner {
      background: rgba(249,226,175,0.1);
      border: 1px solid #f9e2af;
      border-radius: 6px; padding: 8px 10px; margin-bottom: 10px;
      font-size: 11px; color: #f9e2af;
    }
    .escalation-banner strong { display: block; margin-bottom: 2px; }

    /* ── Blocked / Robert banners ── */
    .blocked-banner {
      background: rgba(243,139,168,0.1);
      border: 1px solid #f38ba8;
      border-radius: 6px; padding: 8px 10px; margin-bottom: 10px;
      font-size: 11px; color: #f38ba8;
    }
    .blocked-banner strong { display: block; margin-bottom: 2px; }
    .robert-banner {
      background: rgba(250,179,135,0.1);
      border: 1px solid #fab387;
      border-radius: 6px; padding: 8px 10px; margin-bottom: 10px;
      font-size: 11px; color: #fab387;
    }
    .robert-banner strong { display: block; margin-bottom: 2px; }

    /* ── Section ── */
    .section { margin-bottom: 10px; }
    .section-label {
      font-size: 9px; font-weight: 700; color: #6c7086;
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px;
    }
    .section-text { font-size: 12px; color: #bac2de; line-height: 1.5; }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      background: #313244; border-radius: 99px;
      height: 5px; margin-bottom: 8px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: #a6e3a1;
      border-radius: 99px; transition: width 0.3s;
    }

    /* ── Steps ── */
    .steps-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .step-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 7px 8px; background: #313244; border-radius: 6px;
      cursor: pointer; transition: background 0.15s; position: relative;
    }
    .step-item:hover { background: #45475a; }
    .step-item.done { opacity: 0.5; }
    .step-item.requires-robert { border-left: 2px solid #fab387; }
    .step-item.blocked-step { border-left: 2px solid #f38ba8; }
    .step-num {
      flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%;
      background: #585b70; color: #cdd6f4; font-size: 9px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .step-item.done .step-num { background: #a6e3a1; color: #1e1e2e; }
    .step-body { flex: 1; min-width: 0; }
    .step-text { font-size: 12px; color: #cdd6f4; line-height: 1.4; }
    .step-item.done .step-text { text-decoration: line-through; color: #6c7086; }
    .step-meta {
      display: flex; align-items: center; gap: 4px; margin-top: 3px; flex-wrap: wrap;
    }
    .step-chip {
      font-size: 9px; padding: 1px 5px; border-radius: 99px; font-weight: 600;
    }
    .chip-time    { background: #313244; color: #89b4fa; border: 1px solid #45475a; }
    .chip-robert  { background: rgba(250,179,135,0.2); color: #fab387; border: 1px solid #fab387; }
    .chip-blocked { background: rgba(243,139,168,0.2); color: #f38ba8; border: 1px solid #f38ba8; }
    .chip-cat     { background: #313244; color: #6c7086; border: 1px solid #45475a; }
    .step-criteria {
      font-size: 10px; color: #585b70; margin-top: 2px; font-style: italic;
    }

    /* ── Dependency chips ── */
    .dep-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .dep-chip {
      font-size: 9px; padding: 1px 6px; border-radius: 99px;
      background: rgba(137,180,250,0.15); color: #89b4fa;
      border: 1px solid rgba(137,180,250,0.4); cursor: pointer;
      text-decoration: none;
    }
    .dep-chip:hover { background: rgba(137,180,250,0.3); }

    /* ── Links ── */
    .links-list { display: flex; flex-direction: column; gap: 3px; }
    .link-item {
      font-size: 11px; color: #89b4fa; word-break: break-all; text-decoration: none;
    }
    .link-item:hover { text-decoration: underline; }

    /* ── History drawer ── */
    .history-toggle {
      width: 100%; background: #313244; border: none; color: #6c7086;
      font-size: 10px; font-weight: 600; padding: 6px 10px; border-radius: 6px;
      cursor: pointer; text-align: left; margin-bottom: 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .history-toggle:hover { background: #45475a; color: #cdd6f4; }
    .history-list {
      display: none; flex-direction: column; gap: 4px; margin-bottom: 10px;
    }
    .history-list.open { display: flex; }
    .history-item {
      background: #181825; border: 1px solid #313244; border-radius: 6px;
      padding: 6px 10px; cursor: pointer;
    }
    .history-item:hover { border-color: #585b70; }
    .history-item-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2px;
    }
    .history-item-date { font-size: 10px; color: #6c7086; }
    .history-item-action { font-size: 11px; color: #bac2de; line-height: 1.4; }

    /* ── Divider / buttons ── */
    .divider { border: none; border-top: 1px solid #313244; margin: 10px 0; }
    .btn-row { display: flex; gap: 6px; margin-top: 10px; }
    .btn {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 5px; padding: 8px 10px; border: none; border-radius: 7px;
      font-size: 11px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-refresh { background: #585b70; color: #cdd6f4; }
    .btn-copy    { background: #a6e3a1; color: #1e1e2e; }
    .btn-open    { background: #89b4fa; color: #1e1e2e; }
    .btn-done-gate { background: #cba6f7; color: #1e1e2e; flex: 0 0 auto; padding: 8px 12px; }

    /* ── Done gate result ── */
    .done-gate-result {
      margin-top: 8px; border-radius: 6px; padding: 8px 10px; font-size: 11px;
    }
    .done-gate-ok   { background: rgba(166,227,161,0.15); border: 1px solid #a6e3a1; color: #a6e3a1; }
    .done-gate-fail { background: rgba(243,139,168,0.1);  border: 1px solid #f38ba8; color: #f38ba8; }
    .done-gate-item { margin-top: 4px; padding-left: 8px; }

    /* ── Meta / loading / error ── */
    .meta-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 10px; color: #585b70; margin-top: 8px;
    }
    .loading { text-align: center; padding: 30px 0; color: #6c7086; font-size: 12px; }
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid #45475a; border-top-color: #cba6f7;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      background: rgba(243,139,168,0.1); border: 1px solid #f38ba8;
      border-radius: 6px; padding: 10px; font-size: 11px; color: #f38ba8; text-align: center;
    }
    .toast {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: #a6e3a1; color: #1e1e2e; font-size: 11px; font-weight: 600;
      padding: 6px 14px; border-radius: 99px; opacity: 0;
      transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="root"><div class="loading"><div class="spinner"></div><br>Loading…</div></div>
  <div class="toast" id="toast"></div>
<script>
(function() {
  var POWERUP_API_KEY = (window.JOYCE_POWERUP_CONFIG && window.JOYCE_POWERUP_CONFIG.appKey) || '';
  if (!POWERUP_API_KEY) {
    document.getElementById('root').innerHTML = '<div class="error">TRELLO_POWERUP_API_KEY is not configured.</div>';
    return;
  }
  var t = window.TrelloPowerUp.iframe({ appKey: POWERUP_API_KEY, appName: 'Joyce Time Tracker' });
  var BASE_URL = window.location.origin;

  var state = {
    card: null,
    boardName: '',
    listName: '',
    plan: null,
    steps: [],
    progress: { total: 0, completed: 0, openRobert: 0, openBlocked: 0, totalMinutes: 0, remainingMinutes: 0 },
    cardState: null,
    priorityScore: null,
    priorityTier: null,
    generatedAt: null,
    cached: false,
    loading: true,
    generating: false,
    error: null,
    stepsDone: {},
    historyOpen: false,
    history: [],
    doneGateResult: null,
    checkingDoneGate: false,
  };

  // ── Toast ─────────────────────────────────────────────────────────────────────
  function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2200);
  }

  // ── Format minutes ────────────────────────────────────────────────────────────
  function fmtMin(m) {
    if (!m || m <= 0) return '?';
    if (m < 60) return m + 'm';
    var h = Math.floor(m / 60); var min = m % 60;
    return min > 0 ? h + 'h ' + min + 'm' : h + 'h';
  }

  // ── Confidence class ──────────────────────────────────────────────────────────
  function confClass(score) {
    if (score >= 80) return 'confidence-high';
    if (score >= 55) return 'confidence-mid';
    return 'confidence-low';
  }

  // ── Escalation label ──────────────────────────────────────────────────────────
  var ESCALATION_LABELS = {
    money_decision: '💰 Money Decision',
    legal_approval: '⚖️ Legal Approval',
    scope_change: '📐 Scope Change',
    worker_performance: '👤 Worker Performance',
    deadline_risk: '⏰ Deadline Risk',
    contradiction: '⚠️ Contradiction',
    low_confidence: '🤔 Low Confidence',
  };

  // ── Fetch plan ────────────────────────────────────────────────────────────────
  function fetchPlan(forceRefresh) {
    if (!state.card) return;
    state.generating = true;
    state.error = null;
    state.doneGateResult = null;
    render();

    var body = JSON.stringify({
      "0": {
        json: {
          cardId: state.card.id,
          cardName: state.card.name,
          cardUrl: state.card.url || ('https://trello.com/c/' + state.card.id),
          boardName: state.boardName || '',
          listName: state.listName || '',
          forceRefresh: !!forceRefresh,
        }
      }
    });

    fetch(BASE_URL + '/api/trpc/aptlss.generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: body,
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      var result = data[0] && data[0].result && data[0].result.data;
      if (!result) throw new Error('No plan returned');
      state.plan = result.plan;
      state.steps = result.steps || [];
      state.progress = result.progress || state.progress;
      state.cardState = result.cardState;
      state.priorityScore = result.priorityScore;
      state.priorityTier = result.priorityTier;
      state.generatedAt = result.generatedAt;
      state.cached = result.cached;
      state.generating = false;
      state.loading = false;
      render();
    })
    .catch(function(e) {
      state.error = e.message || 'Failed to generate plan';
      state.generating = false;
      state.loading = false;
      render();
    });
  }

  // ── Toggle step done (local + Trello storage) ─────────────────────────────────
  function toggleStep(num) {
    if (!state.card) return;
    var key = 'aptlss_steps_' + state.card.id;
    var done = state.stepsDone[state.card.id] || {};
    if (done[num]) { delete done[num]; } else { done[num] = true; }
    state.stepsDone[state.card.id] = done;
    t.set('card', 'shared', key, JSON.stringify(done)).catch(function() {});
    render();
  }

  // ── Check Done Gate ───────────────────────────────────────────────────────────
  function checkDoneGate() {
    if (!state.card || state.checkingDoneGate) return;
    state.checkingDoneGate = true;
    state.doneGateResult = null;
    render();

    fetch(BASE_URL + '/api/trpc/aptlss.doneGateCheck?batch=1&input=' +
      encodeURIComponent(JSON.stringify({ "0": { json: { cardId: state.card.id } } })), {
      credentials: 'include',
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var result = data[0] && data[0].result && data[0].result.data;
      state.doneGateResult = result || { ready: false, missing: ['Could not check'] };
      state.checkingDoneGate = false;
      render();
    })
    .catch(function() {
      state.doneGateResult = { ready: false, missing: ['Server error'] };
      state.checkingDoneGate = false;
      render();
    });
  }

  // ── Copy plan as Trello comment ───────────────────────────────────────────────
  function copyPlanAsComment() {
    if (!state.plan) return;
    var p = state.plan;
    var lines = [];
    lines.push('🎯 **APTLSS Plan** — ' + (state.card ? state.card.name : '') + ' [' + p.urgencyLabel + ']');
    if (p.confidenceScore !== undefined) lines.push('📊 Confidence: ' + p.confidenceScore + '/100 — ' + (p.confidenceReason || ''));
    lines.push('');
    lines.push('**⚡ Next Best Action:** ' + (p.nextBestAction || p.action));
    lines.push('');
    lines.push('**📋 Plan:** ' + p.plan);
    lines.push('');
    lines.push('**⏱ Timeline:** ' + p.timeline);
    lines.push('');
    lines.push('**📝 Steps:**');
    (p.steps || []).forEach(function(s) {
      var prefix = s.done ? '✓' : '○';
      var meta = [];
      if (s.estimatedMinutes) meta.push(fmtMin(s.estimatedMinutes));
      if (s.requiresRobert) meta.push('⚠️ Robert');
      if (s.blockedBy) meta.push('🚫 Blocked');
      lines.push(prefix + ' ' + s.number + '. ' + s.text + (meta.length ? ' [' + meta.join(', ') + ']' : ''));
      if (s.completionCriteria) lines.push('   ✅ Done when: ' + s.completionCriteria);
    });
    lines.push('');
    lines.push('**✅ Success:** ' + p.summary);
    if (p.nextCheckpoint) lines.push('**🔍 Next Checkpoint:** ' + p.nextCheckpoint);
    if (p.robertDecision) lines.push('**❓ Robert Decision:** ' + p.robertDecision);
    if (p.isBlocked && p.blockedReason) lines.push('**🚫 Blocked:** ' + p.blockedReason);
    if (p.escalationCategory) lines.push('**🚨 Escalation:** ' + (ESCALATION_LABELS[p.escalationCategory] || p.escalationCategory));
    if (p.links && p.links.length > 0) lines.push('**🔗 Links:** ' + p.links.join(' | '));
    lines.push('');
    lines.push('_Generated by APTLSS AI · ' + new Date().toLocaleString('en-GB') + '_');

    var text = lines.join('\n');
    navigator.clipboard.writeText(text).then(function() {
      showToast('Copied to clipboard!');
    }).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Copied!');
    });
  }

  // ── Render ────────────────────────────────────────────────────────────────────
  function render() {
    var root = document.getElementById('root');
    if (!root) return;

    if (state.loading || state.generating) {
      var msg = state.generating ? 'Generating APTLSS plan… (15–30s)' : 'Loading…';
      root.innerHTML = '<div class="loading"><div class="spinner"></div><br>' + msg + '</div>';
      t.sizeTo('#root').catch(function() {});
      return;
    }

    if (state.error) {
      root.innerHTML =
        '<div class="header"><div class="header-left"><span>🎯</span><h2>APTLSS Plan</h2></div></div>' +
        '<div class="error">' + escHtml(state.error) + '</div>' +
        '<div class="btn-row"><button class="btn btn-refresh" id="btn-retry">↻ Retry</button></div>';
      document.getElementById('btn-retry').addEventListener('click', function() { fetchPlan(true); });
      t.sizeTo('#root').catch(function() {});
      return;
    }

    if (!state.plan) {
      root.innerHTML = '<div class="loading">No plan available.</div>';
      t.sizeTo('#root').catch(function() {});
      return;
    }

    var p = state.plan;
    var cardName = state.card ? state.card.name : '';
    var done = state.stepsDone[state.card ? state.card.id : ''] || {};

    var urgencyClass = 'urgency-' + (p.urgencyLabel || 'MEDIUM');
    var urgencyEmoji = { CRITICAL: '🔴', HIGH: '🟠', MEDIUM: '🟡', LOW: '🟢' }[p.urgencyLabel] || '🟡';

    // Total remaining time
    var totalMin = 0;
    var remainMin = 0;
    (p.steps || []).forEach(function(s) {
      var m = s.estimatedMinutes || 0;
      totalMin += m;
      if (!done[s.number]) remainMin += m;
    });

    // Confidence
    var conf = p.confidenceScore;
    var confHtml = conf !== undefined
      ? '<span class="badge ' + confClass(conf) + '">🎯 ' + conf + '% confidence</span>'
      : '';

    // Time badge
    var timeHtml = remainMin > 0
      ? '<span class="badge time-badge">⏱ ~' + fmtMin(remainMin) + ' left</span>'
      : '';

    // Progress badge
    var progTotal = (p.steps || []).length;
    var progDone = Object.keys(done).length;
    var progHtml = progTotal > 0
      ? '<span class="badge progress-badge">' + progDone + '/' + progTotal + ' done</span>'
      : '';

    // State badge
    var stateHtml = state.cardState
      ? '<span class="badge state-badge">' + state.cardState.replace(/_/g, ' ') + '</span>'
      : '';

    // Priority badge
    var prioHtml = state.priorityTier
      ? '<span class="badge state-badge">P:' + state.priorityTier + '</span>'
      : '';

    // Confidence reason
    var confReasonHtml = p.confidenceReason
      ? '<div class="confidence-reason">💭 ' + escHtml(p.confidenceReason) + '</div>'
      : '';

    // Escalation banner
    var escalationHtml = '';
    if (p.escalationCategory) {
      var label = ESCALATION_LABELS[p.escalationCategory] || p.escalationCategory;
      escalationHtml = '<div class="escalation-banner"><strong>🚨 Escalation: ' + label + '</strong>' +
        (p.robertDecision ? escHtml(p.robertDecision) : '') + '</div>';
    }

    // Blocked banner
    var blockedHtml = '';
    if (p.isBlocked && p.blockedReason) {
      blockedHtml = '<div class="blocked-banner"><strong>🚫 BLOCKED</strong>' + escHtml(p.blockedReason) + '</div>';
    }

    // Robert banner (only if not already in escalation)
    var robertHtml = '';
    if (p.robertDecision && !p.escalationCategory) {
      robertHtml = '<div class="robert-banner"><strong>❓ Robert Decision Needed</strong>' + escHtml(p.robertDecision) + '</div>';
    }

    // Progress bar
    var pct = progTotal > 0 ? Math.round((progDone / progTotal) * 100) : 0;
    var progressBarHtml = progTotal > 0
      ? '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>'
      : '';

    // Steps
    var stepsHtml = '';
    if (p.steps && p.steps.length > 0) {
      stepsHtml = '<ul class="steps-list">';
      p.steps.forEach(function(s) {
        var isDone = !!done[s.number];
        var extraClass = s.requiresRobert ? ' requires-robert' : (s.blockedBy ? ' blocked-step' : '');
        var chips = '';
        if (s.estimatedMinutes) chips += '<span class="step-chip chip-time">⏱ ' + fmtMin(s.estimatedMinutes) + '</span>';
        if (s.requiresRobert) chips += '<span class="step-chip chip-robert">⚠️ Robert</span>';
        if (s.blockedBy) chips += '<span class="step-chip chip-blocked">🚫 Blocked</span>';
        if (s.category && s.category !== 'internal_work') chips += '<span class="step-chip chip-cat">' + s.category.replace(/_/g, ' ') + '</span>';
        var depChips = '';
        if (s.dependsOnCards && s.dependsOnCards.length > 0) {
          depChips = '<div class="dep-chips">' +
            s.dependsOnCards.map(function(id) {
              return '<a class="dep-chip" href="https://trello.com/c/' + escHtml(id) + '" target="_blank">🔗 ' + escHtml(id.slice(0,8)) + '</a>';
            }).join('') +
          '</div>';
        }
        var criteriaHtml = s.completionCriteria
          ? '<div class="step-criteria">✅ ' + escHtml(s.completionCriteria) + '</div>'
          : '';
        stepsHtml +=
          '<li class="step-item' + (isDone ? ' done' : '') + extraClass + '" data-num="' + s.number + '">' +
            '<div class="step-num">' + (isDone ? '✓' : s.number) + '</div>' +
            '<div class="step-body">' +
              '<div class="step-text">' + escHtml(s.text) + '</div>' +
              (chips ? '<div class="step-meta">' + chips + '</div>' : '') +
              criteriaHtml +
              depChips +
            '</div>' +
          '</li>';
      });
      stepsHtml += '</ul>';
    }

    // Links
    var linksHtml = '';
    if (p.links && p.links.length > 0) {
      linksHtml =
        '<div class="section">' +
          '<div class="section-label">🔗 Links</div>' +
          '<div class="links-list">' +
            p.links.map(function(l) {
              var isUrl = l.startsWith('http');
              return isUrl
                ? '<a class="link-item" href="' + escHtml(l) + '" target="_blank" rel="noopener">' + escHtml(l) + '</a>'
                : '<div class="link-item">' + escHtml(l) + '</div>';
            }).join('') +
          '</div>' +
        '</div>';
    }

    // History drawer
    var historyHtml = '';
    if (state.history.length > 0) {
      historyHtml = '<button class="history-toggle" id="btn-history">📜 Plan History (' + state.history.length + ') <span>' + (state.historyOpen ? '▲' : '▼') + '</span></button>' +
        '<div class="history-list' + (state.historyOpen ? ' open' : '') + '" id="history-list">' +
        state.history.map(function(h, i) {
          var d = new Date(h.generatedAt);
          var dateStr = d.toLocaleString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
          var urg = h.plan && h.plan.urgencyLabel ? h.plan.urgencyLabel : '';
          return '<div class="history-item" data-idx="' + i + '">' +
            '<div class="history-item-header">' +
              '<span class="badge urgency-' + urg + '" style="font-size:9px">' + urg + '</span>' +
              '<span class="history-item-date">' + dateStr + '</span>' +
            '</div>' +
            '<div class="history-item-action">' + escHtml((h.plan && h.plan.action) || '') + '</div>' +
          '</div>';
        }).join('') +
        '</div>';
    }

    // Done gate result
    var doneGateHtml = '';
    if (state.checkingDoneGate) {
      doneGateHtml = '<div class="done-gate-result done-gate-fail">Checking…</div>';
    } else if (state.doneGateResult) {
      var dg = state.doneGateResult;
      if (dg.ready) {
        doneGateHtml = '<div class="done-gate-result done-gate-ok">✅ Ready to move to DONE</div>';
      } else {
        doneGateHtml = '<div class="done-gate-result done-gate-fail"><strong>Not ready for DONE:</strong>' +
          (dg.missing || []).map(function(m) { return '<div class="done-gate-item">• ' + escHtml(m) + '</div>'; }).join('') +
        '</div>';
      }
    }

    var genTime = state.generatedAt
      ? new Date(state.generatedAt).toLocaleString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })
      : '';

    root.innerHTML =
      '<div class="header">' +
        '<div class="header-left"><span>🎯</span><h2>APTLSS Plan</h2></div>' +
        '<span class="badge ' + urgencyClass + '">' + urgencyEmoji + ' ' + (p.urgencyLabel || 'MEDIUM') + '</span>' +
      '</div>' +
      '<div class="card-name">' + escHtml(cardName) + '</div>' +

      '<div class="badge-row">' + confHtml + timeHtml + progHtml + stateHtml + prioHtml + '</div>' +
      confReasonHtml +

      escalationHtml +
      blockedHtml +
      robertHtml +

      '<div class="nba-banner">' +
        '<div class="nba-label">⚡ Next Best Action</div>' +
        '<div class="nba-text">' + escHtml(p.nextBestAction || p.action || '') + '</div>' +
      '</div>' +

      progressBarHtml +

      '<div class="section">' +
        '<div class="section-label">📋 Plan</div>' +
        '<div class="section-text">' + escHtml(p.plan || '') + '</div>' +
      '</div>' +

      '<div class="section">' +
        '<div class="section-label">⏱ Timeline' + (totalMin > 0 ? ' · Total ~' + fmtMin(totalMin) : '') + '</div>' +
        '<div class="section-text">' + escHtml(p.timeline || '') + '</div>' +
      '</div>' +

      (p.nextCheckpoint
        ? '<div class="section"><div class="section-label">🔍 Next Checkpoint</div><div class="section-text">' + escHtml(p.nextCheckpoint) + '</div></div>'
        : '') +

      '<div class="section">' +
        '<div class="section-label">📝 Steps (tap to check off)</div>' +
        stepsHtml +
      '</div>' +

      '<div class="section">' +
        '<div class="section-label">✅ Success</div>' +
        '<div class="section-text">' + escHtml(p.summary || '') + '</div>' +
      '</div>' +

      linksHtml +
      historyHtml +
      doneGateHtml +

      '<hr class="divider" />' +
      '<div class="btn-row">' +
        '<button class="btn btn-refresh" id="btn-refresh">↻ Refresh</button>' +
        '<button class="btn btn-copy" id="btn-copy">📋 Copy</button>' +
        '<button class="btn btn-open" id="btn-open">↗ Card</button>' +
        '<button class="btn btn-done-gate" id="btn-done-gate" title="Check if ready for DONE">✓?</button>' +
      '</div>' +
      '<div class="meta-row">' +
        '<span>' + (state.cached ? 'Cached' : 'Fresh') + '</span>' +
        '<span>' + genTime + '</span>' +
      '</div>';

    // Wire step toggles
    root.querySelectorAll('.step-item').forEach(function(el) {
      el.addEventListener('click', function(e) {
        if (e.target.tagName === 'A') return;
        toggleStep(parseInt(el.getAttribute('data-num'), 10));
      });
    });

    var btnRefresh = document.getElementById('btn-refresh');
    if (btnRefresh) btnRefresh.addEventListener('click', function() { fetchPlan(true); });

    var btnCopy = document.getElementById('btn-copy');
    if (btnCopy) btnCopy.addEventListener('click', copyPlanAsComment);

    var btnOpen = document.getElementById('btn-open');
    if (btnOpen) btnOpen.addEventListener('click', function() {
      if (state.card) window.open(state.card.url || ('https://trello.com/c/' + state.card.id), '_blank');
    });

    var btnDoneGate = document.getElementById('btn-done-gate');
    if (btnDoneGate) btnDoneGate.addEventListener('click', checkDoneGate);

    var btnHistory = document.getElementById('btn-history');
    if (btnHistory) btnHistory.addEventListener('click', function() {
      state.historyOpen = !state.historyOpen;
      render();
    });

    t.sizeTo('#root').catch(function() {});
  }

  // ── HTML escape ───────────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  t.card('id', 'name', 'url', 'idList', 'idBoard').then(function(card) {
    state.card = card;
    return Promise.all([
      t.board('name').then(function(b) { state.boardName = b.name; }).catch(function() {}),
      t.list('name').then(function(l) { state.listName = l.name; }).catch(function() {}),
      t.get('card', 'shared', 'aptlss_steps_' + card.id).then(function(val) {
        if (val) { try { state.stepsDone[card.id] = JSON.parse(val); } catch(e) {} }
      }).catch(function() {}),
    ]);
  }).then(function() {
    // Load cached plan first for instant display
    fetch(BASE_URL + '/api/trpc/aptlss.getCached?batch=1&input=' +
      encodeURIComponent(JSON.stringify({ "0": { json: { cardId: state.card.id } } })), {
      credentials: 'include',
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      var result = data[0] && data[0].result && data[0].result.data;
      if (result && result.plan) {
        state.plan = result.plan;
        state.steps = result.steps || [];
        state.progress = result.progress || state.progress;
        state.cardState = result.cardState;
        state.priorityScore = result.priorityScore;
        state.priorityTier = result.priorityTier;
        state.generatedAt = result.generatedAt;
        state.cached = true;
        state.loading = false;
        render();
        // Stale cache? Silently refresh
        var ageMs = Date.now() - new Date(result.generatedAt).getTime();
        if (ageMs > 4 * 60 * 60 * 1000) { fetchPlan(true); }
      } else {
        fetchPlan(false);
      }
    })
    .catch(function() { fetchPlan(false); });

    // Load plan history
    fetch(BASE_URL + '/api/trpc/aptlss.getAll?batch=1&input=' +
      encodeURIComponent(JSON.stringify({ "0": { json: {} } })), {
      credentials: 'include',
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var all = data[0] && data[0].result && data[0].result.data;
      if (all && state.card) {
        var cardId = state.card.id;
        var cardHistory = all
          .filter(function(h) { return h.cardId === cardId; })
          .map(function(h) {
            var plan = null;
            try { plan = JSON.parse(h.planJson); } catch(e) {}
            return { generatedAt: h.generatedAt, plan: plan };
          })
          .sort(function(a, b) { return new Date(b.generatedAt) - new Date(a.generatedAt); })
          .slice(0, 5);
        if (cardHistory.length > 1) {
          state.history = cardHistory;
          render();
        }
      }
    })
    .catch(function() {});
  }).catch(function(e) {
    state.error = 'Could not load card: ' + (e.message || 'Unknown error');
    state.loading = false;
    render();
  });
})();
</script>
</body>
</html>
