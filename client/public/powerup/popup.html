<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Tracker</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="/api/powerup/config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 16px;
    }
    h2 {
      font-size: 12px;
      font-weight: 700;
      color: #cba6f7;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .card-name {
      font-size: 13px;
      color: #bac2de;
      margin-bottom: 14px;
      line-height: 1.4;
      max-height: 40px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .timer-display {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 32px;
      font-weight: 700;
      color: #a6e3a1;
      text-align: center;
      letter-spacing: 3px;
      padding: 10px 0 14px;
    }
    .timer-display.idle {
      color: #585b70;
      font-size: 24px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-start { background: #a6e3a1; color: #1e1e2e; }
    .btn-stop  { background: #f38ba8; color: #1e1e2e; }
    .divider {
      border: none;
      border-top: 1px solid #313244;
      margin: 12px 0;
    }
    .today-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #6c7086;
    }
    .today-row span:last-child { color: #89b4fa; font-weight: 600; }
    .error { font-size: 11px; color: #f38ba8; text-align: center; margin-top: 8px; }
    .loading { font-size: 12px; color: #6c7086; text-align: center; padding: 20px 0; }
  </style>
</head>
<body>
  <div id="root"><div class="loading">Loading…</div></div>

<script>
(function() {
  var POWERUP_API_KEY = (window.JOYCE_POWERUP_CONFIG && window.JOYCE_POWERUP_CONFIG.appKey) || '';
  if (!POWERUP_API_KEY) {
    document.getElementById('root').innerHTML = '<div class="error">TRELLO_POWERUP_API_KEY is not configured.</div>';
    return;
  }
  var t = window.TrelloPowerUp.iframe({ appKey: POWERUP_API_KEY, appName: 'Joyce Time Tracker' });
  var BASE_URL = window.location.origin;

  var state = {
    card: null,
    isRunning: false,
    otherActiveTimer: null,
    startedAt: null,
    elapsedSeconds: 0,
    todaySeconds: 0,
    loading: true,
    error: null,
    busy: false,
  };

  var tickInterval = null;

  // ── helpers ──────────────────────────────────────────────────────────────────
  function escHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
  function pad(n) { return String(n).padStart(2, '0'); }
  function formatHHMMSS(secs) {
    var h = Math.floor(secs / 3600);
    var m = Math.floor((secs % 3600) / 60);
    var s = secs % 60;
    return pad(h) + ':' + pad(m) + ':' + pad(s);
  }
  function formatDuration(secs) {
    var h = Math.floor(secs / 3600);
    var m = Math.floor((secs % 3600) / 60);
    if (h > 0) return h + 'h ' + pad(m) + 'm';
    return m + 'm ' + pad(secs % 60) + 's';
  }

  // ── API calls ─────────────────────────────────────────────────────────────────
  function getPowerUpToken() {
    return t.getRestApi().then(function(client) {
      return client.getToken().then(function(existing) {
        return existing || client.authorize({ expiration: 'never', scope: 'read,write' });
      });
    });
  }

  function apiCall(path, body) {
    return getPowerUpToken().then(function(token) {
      return fetch(BASE_URL + '/api/trpc/powerup.' + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ json: Object.assign({ token: token }, body || {}) }),
      });
    }).then(function(r) { return r.json(); }).then(function(data) {
      if (data.error) throw new Error(data.error.json && data.error.json.message || data.error.message || 'API error');
      return data.result ? data.result.data : data;
    });
  }

  function getTimerState(cardId, date) {
    return apiCall('timerState', { cardId: cardId, date: date });
  }

  function startTimer(cardId, cardName, cardUrl, boardName, listName) {
    return apiCall('startTimer', {
      cardId: cardId,
      cardName: cardName,
      cardUrl: cardUrl,
      boardName: boardName || 'Unknown Board',
      listName: listName || 'Unknown',
    });
  }

  function stopTimer(cardId) {
    return apiCall('stopTimer', { cardId: cardId });
  }

  // ── date helper ───────────────────────────────────────────────────────────────
  function getEATDate() {
    var eatNow = new Date(Date.now() + 3 * 60 * 60 * 1000);
    return eatNow.toISOString().slice(0, 10);
  }

  function isEATSunday() {
    return new Date(Date.now() + 3 * 60 * 60 * 1000).getUTCDay() === 0;
  }

  // ── tick ──────────────────────────────────────────────────────────────────────
  function startTick() {
    stopTick();
    tickInterval = setInterval(function() {
      if (state.isRunning && state.startedAt) {
        state.elapsedSeconds = Math.floor((Date.now() - state.startedAt) / 1000);
        render();
      }
    }, 1000);
  }

  function stopTick() {
    if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
  }

  // ── render ────────────────────────────────────────────────────────────────────
  function render() {
    var root = document.getElementById('root');
    if (!root) return;

    if (state.loading) {
      root.innerHTML = '<div class="loading">Loading…</div>';
      return;
    }

    var cardName = state.card ? state.card.name : 'Unknown Card';
    var timerHtml = state.isRunning
      ? '<div class="timer-display">' + formatHHMMSS(state.elapsedSeconds) + '</div>'
      : '<div class="timer-display idle">00:00:00</div>';

    var btnHtml = state.isRunning
      ? '<button class="btn btn-stop" id="action-btn" ' + (state.busy ? 'disabled' : '') + '>⏹ Stop Timer</button>'
      : '<button class="btn btn-start" id="action-btn" ' + (state.busy ? 'disabled' : '') + '>' + (isEATSunday() ? '⏱ Start Emergency Timer' : state.otherActiveTimer ? '⏱ Switch Timer' : '⏱ Start Timer') + '</button>';

    var protectedDayHtml = !state.isRunning && isEATSunday()
      ? '<div class="error" style="color:#166534;background:#f0fdf4;border-color:#86efac">Sunday is protected. Start only for a genuine emergency.</div>'
      : '';
    var switchHtml = !state.isRunning && state.otherActiveTimer
      ? '<div class="error" style="color:#92400e;background:#fffbeb;border-color:#fcd34d">Switching will stop and save the timer for ' + escHtml(state.otherActiveTimer.cardName || 'the current card') + '.</div>'
      : '';

    var todayHtml = '';
    if (state.todaySeconds > 0) {
      todayHtml = '<hr class="divider"><div class="today-row"><span>Today on this card</span><span>' + formatDuration(state.todaySeconds) + '</span></div>';
    }

    var errorHtml = state.error ? '<div class="error">' + escHtml(state.error) + '</div>' : '';

    root.innerHTML =
      '<h2>⏱ Time Tracker</h2>' +
      '<div class="card-name">' + escHtml(cardName) + '</div>' +
      timerHtml +
      btnHtml +
      protectedDayHtml +
      switchHtml +
      todayHtml +
      errorHtml;

    var btn = document.getElementById('action-btn');
    if (btn) {
      btn.addEventListener('click', function() {
        if (state.busy) return;
        if (state.isRunning) {
          handleStop();
        } else {
          handleStart();
        }
      });
    }
  }

  // ── actions ───────────────────────────────────────────────────────────────────
  function handleStart() {
    if (!state.card) return;
    var confirmations = [];
    if (state.otherActiveTimer) confirmations.push('The timer for ' + (state.otherActiveTimer.cardName || 'the current card') + ' will be stopped and saved.');
    if (isEATSunday()) confirmations.push('Sunday is Joyce\'s protected day off. Continue only for a genuine emergency.');
    if (confirmations.length && !window.confirm(confirmations.join('\n\n') + '\n\nContinue?')) return;
    state.busy = true;
    state.error = null;
    render();

    startTimer(
      state.card.id,
      state.card.name,
      state.card.url || ('https://trello.com/c/' + state.card.id),
      state.boardName || 'Unknown Board',
      state.listName || 'Unknown'
    ).then(function() {
      state.isRunning = true;
      state.otherActiveTimer = null;
      state.startedAt = Date.now();
      state.elapsedSeconds = 0;
      state.busy = false;
      startTick();
      // Store running flag in Trello card storage for button label sync
      t.set('card', 'shared', 'timerRunning', true);
      render();
    }).catch(function(e) {
      state.error = e.message || 'Failed to start timer';
      state.busy = false;
      render();
    });
  }

  function handleStop() {
    if (!state.card) return;
    state.busy = true;
    state.error = null;
    render();

    stopTimer(state.card.id).then(function(entry) {
      state.isRunning = false;
      state.startedAt = null;
      if (entry) {
        state.todaySeconds += entry.durationSeconds || 0;
        t.set('card', 'shared', 'todaySeconds', String(state.todaySeconds));
      }
      state.elapsedSeconds = 0;
      state.busy = false;
      stopTick();
      t.set('card', 'shared', 'timerRunning', false);
      render();
    }).catch(function(e) {
      state.error = e.message || 'Failed to stop timer';
      state.busy = false;
      render();
    });
  }

  // ── init ──────────────────────────────────────────────────────────────────────
  t.card('id', 'name', 'url', 'idList', 'idBoard').then(function(card) {
    state.card = card;

    // Fetch board and list names
    return Promise.all([
      t.board('name').then(function(b) { state.boardName = b.name; }).catch(function() {}),
      t.list('name').then(function(l) { state.listName = l.name; }).catch(function() {}),
      getTimerState(card.id, getEATDate()).then(function(timerState) {
        var active = timerState && timerState.active;
        if (active && active.cardId === card.id) {
          state.isRunning = true;
          state.startedAt = new Date(active.startedAt).getTime();
          state.elapsedSeconds = Math.floor((Date.now() - state.startedAt) / 1000);
        } else if (active) {
          state.otherActiveTimer = active;
        }
        if (timerState && timerState.cardSummary) state.todaySeconds = timerState.cardSummary.totalSeconds || 0;
      }).catch(function() {}),
    ]);
  }).then(function() {
    state.loading = false;
    if (state.isRunning) startTick();
    render();
    t.sizeTo('#root').catch(function() {});
  }).catch(function(e) {
    state.loading = false;
    state.error = 'Could not load card data: ' + (e.message || 'Unknown error');
    render();
  });
})();
</script>
</body>
</html>
