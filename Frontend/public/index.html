<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    
    <!-- PWA Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="alternate icon" href="/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    
    <!-- PWA Primary Meta Tags -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="AutoReminder - Intelligent Trello task management and reminder automation system. Stay on top of your tasks with automated reminders." />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AutoReminder" />
    
    <!-- Windows PWA Support -->
    <meta name="msapplication-TileColor" content="#6366f1" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- Additional PWA Meta -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="AutoReminder" />
    
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    />
    <!-- Material-UI Icons -->
    <link
      rel="stylesheet"

    />
